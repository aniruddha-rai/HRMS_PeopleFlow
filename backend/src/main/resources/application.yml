spring:
  application:
    name: peopleflow-hrms-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/HRMS}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin@123}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: PeopleFlowHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:3}
    validate-on-migrate: true
    clean-disabled: true

  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway

security:
  jwt:
    issuer: ${JWT_ISSUER:peopleflow}
    secret: ${JWT_SECRET:change-me-in-real-env}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}